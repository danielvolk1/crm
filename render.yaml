services:
  - type: web
    name: crm-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # You will set this in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set after deploying frontend
      - key: JWT_SECRET
        generateValue: true
